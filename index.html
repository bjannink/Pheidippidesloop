<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>Pheidippidesloop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 100%;
      height: 100vh;
      height: 100dvh;
    }

    .map-panel {
      background: rgba(255,255,255,0.94);
      color: #1f2933;
      box-shadow: 0 1px 6px rgba(0,0,0,0.28);
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.35;
    }

    .title-panel {
      padding: 10px 12px;
      min-width: 210px;
    }

    .title-panel h1 {
      margin: 0 0 4px;
      font-size: 17px;
      line-height: 1.15;
      font-weight: 700;
    }

    .title-panel .meta {
      color: #4b5563;
      font-size: 12px;
    }

    .title-panel .distance-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .distance-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 7px;
      border-radius: 999px;
      background: #f3f4f6;
      font-weight: 700;
      white-space: nowrap;
    }

    .distance-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      display: inline-block;
    }

    .route-filter {
      padding: 4px;
      display: inline-flex;
      gap: 2px;
      border-radius: 999px;
    }

    .route-filter button {
      border: 0;
      background: transparent;
      color: #1f2933;
      border-radius: 999px;
      min-height: 28px;
      padding: 0 10px;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
      cursor: pointer;
    }

    .route-filter button:hover {
      background: #f3f4f6;
    }

    .route-filter button.active {
      color: #fff;
      border-color: #1f2933;
      background: #1f2933;
    }

    .leaflet-control-locate a {
      font-size: 18px;
      line-height: 28px;
      text-align: center;
      text-decoration: none;
      color: #333;
      display: block;
      width: 30px;
      height: 30px;
      background: white;
    }

    .mijn-locatie-icoon {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #1e90ff;
      border: 2px solid white;
      box-shadow: 0 0 0 3px rgba(30,144,255,0.25);
    }

    .km-marker {
      border-radius: 50%;
      width: 20px;
      height: 20px;
      line-height: 16px;
      text-align: center;
      font-size: 10px;
      font-weight: bold;
      color: white;
      border: 2px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.35);
      box-sizing: border-box;
    }

    .sf-marker {
      color: white;
      border: 2px solid white;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 10px;
      font-weight: bold;
      white-space: nowrap;
      box-shadow: 0 1px 4px rgba(0,0,0,0.35);
      box-sizing: border-box;
    }

    @media (max-width: 640px) {
      html, body {
        height: 100dvh;
        overflow: hidden;
      }

      .title-panel {
        max-width: calc(100vw - 96px);
        min-width: 0;
        padding: 8px 10px;
      }

      .title-panel h1 {
        font-size: 15px;
      }

      .route-filter {
        width: auto;
        max-width: calc(100vw - 24px);
        box-sizing: border-box;
      }

      .route-filter button {
        flex: 0 0 auto;
        min-height: 36px;
        padding: 0 12px;
        font-size: 13px;
      }

      .leaflet-bottom.leaflet-left {
        left: 50%;
        bottom: max(12px, env(safe-area-inset-bottom));
        transform: translateX(-50%);
        pointer-events: none;
      }

      .leaflet-bottom.leaflet-left .leaflet-control {
        margin: 0;
      }

      .leaflet-bottom.leaflet-left .route-filter {
        pointer-events: auto;
      }
    }
  </style>
</head>

    function getKleur(type) {
      return kleuren[type] || '#666666';
    }

    function getPijlKleur(type) {
      return pijlKleuren[type] || '#444444';
    }

    function getMarkerKleur(ronde) {
      return rondeKleuren[ronde] || '#666666';
    }

    function getTypeNaam(type) {
      var namen = {
        start_gedeeld: 'Gedeeld startdeel',
        finish_gedeeld: 'Gedeeld finishdeel',
        klein: 'Kleine ronde',
        groot: 'Grote ronde'
      };
      return namen[type] || 'Parcours';
    }

    function formatAfstand(km) {
      return km.toFixed(1).replace('.', ',') + ' km';
    }

    function afstandTussen(a, b) {

      var lat1 = a[1] * Math.PI / 180;
      var lat2 = b[1] * Math.PI / 180;
      var dLat = (b[1] - a[1]) * Math.PI / 180;
      var dLon = (b[0] - a[0]) * Math.PI / 180;
      var sinLat = Math.sin(dLat / 2);
      var sinLon = Math.sin(dLon / 2);
      var h = sinLat * sinLat + Math.cos(lat1) * Math.cos(lat2) * sinLon * sinLon;
      return 2 * aardeStraal * Math.atan2(Math.sqrt(h), Math.sqrt(1 - h));
    }

    function lijnAfstand(feature) {
      var coords = feature.geometry && feature.geometry.coordinates;
      if (!coords || coords.length < 2) return 0;
      var totaal = 0;
      for (var i = 1; i < coords.length; i++) {
        totaal += afstandTussen(coords[i - 1], coords[i]);
      }
      return totaal;
    }

    function rondeAfstand(ronde) {
      return geojsonData.features.reduce(function(totaal, feature) {
        var p = feature.properties || {};
        if (ronde === 'klein' && p.klein) return totaal + lijnAfstand(feature);
        if (ronde === 'groot' && p.groot) return totaal + lijnAfstand(feature);
        return totaal;
      }, 0);
    }

    function getLijnPopup(feature) {
      var p = feature.properties || {};
      var rondes = [];
      if (p.klein) rondes.push('kleine ronde');
      if (p.groot) rondes.push('grote ronde');
      return '<b>' + getTypeNaam(p.type) + '</b><br>' +
        'Onderdeel van: ' + rondes.join(' en ') + '<br>' +
        'Segment: ' + formatAfstand(lijnAfstand(feature));
    }

    function getMarkerPopup(feature) {
      var p = feature.properties || {};
      var rondeNamen = {
        beide: 'kleine en grote ronde',
        klein: 'kleine ronde',
        groot: 'grote ronde'
      };
      return '<b>' + (p.label || 'Kilometerpunt') + '</b><br>' +
        'Onderdeel van: ' + (rondeNamen[p.ronde] || 'parcours');
    }

    var parcoursLayer = L.geoJSON(geojsonData, {
      style: function(feature) {
        var type = feature.properties.type;
        return {
          color: getKleur(type),
          weight: 4,
          opacity: 0.95,
          lineCap: 'round',
          lineJoin: 'round'
        };
      },
      onEachFeature: function(feature, layer) {
        layer.bindPopup(getLijnPopup(feature));
      }
    }).addTo(map);

    var routeSegments = [];

    parcoursLayer.eachLayer(function(layer) {
      if (!(layer instanceof L.Polyline)) return;

      var feature = layer.feature || {};
      var type = feature.properties ? feature.properties.type : null;

      var decorator = L.polylineDecorator(layer, {
        patterns: [
          {
            offset: 30,
            repeat: 100,
            symbol: L.Symbol.arrowHead({
              pixelSize: 8,
              polygon: true,
              pathOptions: {
                stroke: true,
                weight: 2,
                color: getPijlKleur(type),
                fillOpacity: 1
              }
            })
          }
        ]
      }).addTo(map);

      routeSegments.push({
        layer: layer,
        decorator: decorator,
        properties: feature.properties || {}
      });
    });

    var markerPoints = [];

    var markerLayer = L.geoJSON(markerData, {
      pointToLayer: function(feature, latlng) {
        var p = feature.properties || {};
        var markerKleur = getMarkerKleur(p.ronde);
        var marker;

        if (p.type === 'start_finish_wissel') {
          marker = L.marker(latlng, {
            interactive: true,
            keyboard: false,
            icon: L.divIcon({
              className: '',
              html: '<div class="sf-marker" style="background:' + markerKleur + ';">Start/Finish</div>',
              iconSize: [78, 24],
              iconAnchor: [39, 12]
            })
          });
          marker._ronde = p.ronde;
          markerPoints.push(marker);
          return marker;
        }

        if (p.type === 'kilometerpunt') {
          marker = L.marker(latlng, {
            interactive: true,
            keyboard: false,
            icon: L.divIcon({
              className: '',
              html: '<div class="km-marker" style="background:' + markerKleur + ';">' + (p.km ?? '') + '</div>',
              iconSize: [20, 20],
              iconAnchor: [10, 10]
            })
          });
          marker._ronde = p.ronde;
          markerPoints.push(marker);
          return marker;
        }

        marker = L.circleMarker(latlng, {
          radius: 5,
          color: '#333',
          weight: 2,
          fillColor: '#fff',
          fillOpacity: 1,
          interactive: false
        });
        marker._ronde = p.ronde;
        markerPoints.push(marker);
        return marker;
      },
      onEachFeature: function(feature, layer) {
        var p = feature.properties || {};
        if (p.type === 'kilometerpunt') {
          layer.bindPopup(getMarkerPopup(feature));
        }

        layer.on('click', function(e) {
          if (e.originalEvent) {
            L.DomEvent.stopPropagation(e.originalEvent);
          }
        });
      }
    }).addTo(map);

    function segmentPastBijRonde(properties, ronde) {
      if (ronde === 'beide') return true;
      return Boolean(properties[ronde]);
    }

    function markerPastBijRonde(marker, ronde) {
      if (ronde === 'beide') return true;
      return marker._ronde === ronde || marker._ronde === 'beide';
    }

    function zetLayerZichtbaar(layer, zichtbaar) {
      if (zichtbaar && !map.hasLayer(layer)) {
        layer.addTo(map);
      } else if (!zichtbaar && map.hasLayer(layer)) {
        map.removeLayer(layer);
      }
    }

    function toonRonde(ronde) {
      routeSegments.forEach(function(segment) {
        var zichtbaar = segmentPastBijRonde(segment.properties, ronde);
        zetLayerZichtbaar(segment.layer, zichtbaar);
        zetLayerZichtbaar(segment.decorator, zichtbaar);
      });

      markerPoints.forEach(function(marker) {
        zetLayerZichtbaar(marker, markerPastBijRonde(marker, ronde));
      });

      document.querySelectorAll('.route-filter button').forEach(function(button) {
        button.classList.toggle('active', button.dataset.ronde === ronde);
      });
    }

    var allesBounds = L.featureGroup([parcoursLayer, markerLayer]);
    if (allesBounds.getBounds().isValid()) {
      map.fitBounds(allesBounds.getBounds(), { padding: [20, 20] });
    } else {
      map.setView([52.1, 5.1], 13);
    }

    var titleControl = L.control({ position: 'topright' });
    titleControl.onAdd = function () {
      var div = L.DomUtil.create('div', 'map-panel title-panel');
      div.innerHTML =
        '<h1>Pheidippidesloop</h1>' +
        '<div class="meta">Parcourskaart voor kleine en grote ronde</div>' +
        '<div class="distance-row">' +
          '<span class="distance-pill"><span class="distance-dot" style="background:#0057B8"></span>Klein 4,1 km</span>' +
          '<span class="distance-pill"><span class="distance-dot" style="background:#D62828"></span>Groot ' + formatAfstand(rondeAfstand('groot')) + '</span>' +
        '</div>';
      L.DomEvent.disableClickPropagation(div);
      return div;
    };
    titleControl.addTo(map);

    var filterControl = L.control({ position: 'bottomleft' });
    filterControl.onAdd = function () {
      var div = L.DomUtil.create('div', 'map-panel route-filter');
      div.innerHTML =
        '<button type="button" class="active" data-ronde="beide">Beide</button>' +
        '<button type="button" data-ronde="klein">Klein</button>' +
        '<button type="button" data-ronde="groot">Groot</button>';
      L.DomEvent.disableClickPropagation(div);
      div.querySelectorAll('button').forEach(function(button) {
        L.DomEvent.on(button, 'click', function(e) {
          L.DomEvent.stop(e);
          toonRonde(button.dataset.ronde);
        });
      });
      return div;
    };
    filterControl.addTo(map);

    var locatieMarker = null;
    var locatieCirkel = null;

    function toonLocatie(e) {
      var latlng = e.latlng;
      var radius = e.accuracy || 0;

      if (locatieMarker) map.removeLayer(locatieMarker);
      if (locatieCirkel) map.removeLayer(locatieCirkel);

      var locatieIcon = L.divIcon({
        className: '',
        html: '<div class="mijn-locatie-icoon"></div>',
        iconSize: [18, 18],
        iconAnchor: [9, 9]
      });

      locatieMarker = L.marker(latlng, { icon: locatieIcon }).addTo(map);

      locatieCirkel = L.circle(latlng, {
        radius: radius,
        weight: 1,
        opacity: 0.6,
        fillOpacity: 0.15
      }).addTo(map);
    }

    function locatieFout(e) {
      alert('Locatie kon niet worden bepaald: ' + e.message);
    }

    map.on('locationfound', toonLocatie);
    map.on('locationerror', locatieFout);

    var LocateControl = L.Control.extend({
      options: { position: 'topleft' },
      onAdd: function() {
        var container = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-control-locate');
        var link = L.DomUtil.create('a', '', container);
        link.href = '#';
        link.title = 'Toon mijn locatie';
        link.innerHTML = '◎';

        L.DomEvent.disableClickPropagation(container);
        L.DomEvent.on(link, 'click', function(e) {
          L.DomEvent.stop(e);
          map.locate({
            setView: true,
            maxZoom: 19,
            enableHighAccuracy: true
          });
        });

        return container;
      }
    });

    map.addControl(new LocateControl());
  </script>
</body>
</html>
