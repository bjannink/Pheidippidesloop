<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>Pheidippidesloop kaarten</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background: #f6f7f9;
      color: #1f2933;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    main {
      width: min(100%, 720px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.15;
    }

    p {
      margin: 0 0 22px;
      color: #4b5563;
      line-height: 1.45;
    }

    .kaart-links {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .kaart-link {
      display: block;
      padding: 18px;
      border-radius: 8px;
      background: #fff;
      color: inherit;
      text-decoration: none;
      box-shadow: 0 1px 6px rgba(0,0,0,0.16);
      border: 2px solid transparent;
    }

    .kaart-link:hover,
    .kaart-link:focus {
      border-color: #1f2933;
      outline: none;
    }

    .kaart-link strong {
      display: block;
      margin-bottom: 6px;
      font-size: 18px;
    }

    .kaart-link span {
      color: #4b5563;
      font-size: 14px;
      line-height: 1.35;
    }

    @media (max-width: 560px) {
      body {
        place-items: start stretch;
        padding: 18px;
      }

      h1 {
        font-size: 23px;
      }

      .kaart-links {
        grid-template-columns: 1fr;
      }

      .kaart-link {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Pheidippidesloop kaarten</h1>
    <p>Kies de kaart die je wilt openen.</p>

    <div class="kaart-links">
      <a class="kaart-link" href="deelnemers.html">
        <strong>Deelnemers en publiek</strong>
        <span>Parcourskaart zonder vrijwilligersposten.</span>
      </a>

      <a class="kaart-link" href="organisatie.html">
        <strong>Organisatie</strong>
        <span>Parcourskaart met vrijwilligersposten.</span>
      </a>
    </div>
  </main>
</body>
</html>
