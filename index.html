<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>Pheidippidesloop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .legend {
      background: rgba(255,255,255,0.94);
      padding: 8px 10px;
      line-height: 1.4;
      color: #222;
      box-shadow: 0 1px 5px rgba(0,0,0,0.3);
      border-radius: 6px;
      font-size: 13px;
    }

    .legend .item {
      display: flex;
      align-items: center;
      margin-bottom: 5px;
    }

    .legend .item:last-child {
      margin-bottom: 0;
    }

    .legend .line {
      width: 22px;
      height: 0;
      border-top-width: 4px;
      border-top-style: solid;
      margin-right: 8px;
      flex: 0 0 auto;
    }

    .leaflet-control-locate a {
      font-size: 18px;
      line-height: 28px;
      text-align: center;
      text-decoration: none;
      color: #333;
      display: block;
      width: 30px;
      height: 30px;
      background: white;
    }

    .mijn-locatie-icoon {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #1e90ff;
      border: 2px solid white;
      box-shadow: 0 0 0 3px rgba(30,144,255,0.25);
    }

    .km-marker {
      border-radius: 50%;
      width: 20px;
      height: 20px;
      line-height: 16px;
      text-align: center;
      font-size: 10px;
      font-weight: bold;
      color: white;
      border: 2px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.35);
      box-sizing: border-box;
    }

    .sf-marker {
      color: white;
      border: 2px solid white;
      border-radius: 5px;
      padding: 1px 5px;
      font-size: 9px;
      font-weight: bold;
      white-space: nowrap;
      box-shadow: 0 1px 4px rgba(0,0,0,0.35);
      box-sizing: border-box;
    }
  </style>
</head>

    var map = L.map('map', {
      zoomControl: true,
      maxZoom: 24
    });

    L.tileLayer.wms('https://service.pdok.nl/hwh/luchtfotorgb/wms/v1_0', {
      layers: 'Actueel_orthoHR',
      format: 'image/png',
      transparent: false,
      version: '1.3.0',
      attribution: 'PDOK Luchtfoto',
      maxZoom: 24
    }).addTo(map);

    // Begin en einde dezelfde kleur
    var gedeeldeKleur = '#E0B400';
    var gedeeldePijlKleur = '#8A6D00';

    var kleuren = {
      start_gedeeld: gedeeldeKleur,
      finish_gedeeld: gedeeldeKleur,
      klein: '#0057B8',
      groot: '#D62828'
    };

    var pijlKleuren = {
      start_gedeeld: gedeeldePijlKleur,
      finish_gedeeld: gedeeldePijlKleur,
      klein: '#003E85',
      groot: '#A61E1E'
    };

    var rondeKleuren = {
      beide: gedeeldeKleur,
      klein: '#0057B8',
      groot: '#D62828'
    };

    function getKleur(type) {
      return kleuren[type] || '#666666';
    }

    function getPijlKleur(type) {
      return pijlKleuren[type] || '#444444';
    }

    function getMarkerKleur(ronde) {
      return rondeKleuren[ronde] || '#666666';
    }

    function getLijnPopup(feature) {
      var p = feature.properties || {};
      return '<b>Segment</b><br>' +
        'Type: ' + (p.type ?? '') + '<br>' +
        'Volgorde: ' + (p.volgorde ?? '') + '<br>' +
        'Kleine ronde: ' + (p.klein ?? '') + '<br>' +
        'Grote ronde: ' + (p.groot ?? '');
    }

    var parcoursLayer = L.geoJSON(geojsonData, {
      style: function(feature) {
        var type = feature.properties.type;
        return {
          color: getKleur(type),
          weight: 4,
          opacity: 0.95,
          lineCap: 'round',
          lineJoin: 'round'
        };
      },
      onEachFeature: function(feature, layer) {
        layer.bindPopup(getLijnPopup(feature));
      }
    }).addTo(map);

    parcoursLayer.eachLayer(function(layer) {
      if (!(layer instanceof L.Polyline)) return;

      var feature = layer.feature || {};
      var type = feature.properties ? feature.properties.type : null;

      L.polylineDecorator(layer, {
        patterns: [
          {
            offset: 30,
            repeat: 100,
            symbol: L.Symbol.arrowHead({
              pixelSize: 8,
              polygon: true,
              pathOptions: {
                stroke: true,
                weight: 2,
                color: getPijlKleur(type),
                fillOpacity: 1
              }
            })
          }
        ]
      }).addTo(map);
    });

    var markerLayer = L.geoJSON(markerData, {
      pointToLayer: function(feature, latlng) {
        var p = feature.properties || {};
        var markerKleur = getMarkerKleur(p.ronde);

        if (p.type === 'start_finish_wissel') {
          return L.marker(latlng, {
            interactive: false,
            icon: L.divIcon({
              className: '',
              html: '<div class="sf-marker" style="background:' + markerKleur + ';">Start/Finish</div>',
              iconSize: [64, 18],
              iconAnchor: [32, 9]
            })
          });
        }

        if (p.type === 'kilometerpunt') {
          return L.marker(latlng, {
            interactive: false,
            icon: L.divIcon({
              className: '',
              html: '<div class="km-marker" style="background:' + markerKleur + ';">' + (p.km ?? '') + '</div>',
              iconSize: [20, 20],
              iconAnchor: [10, 10]
            })
          });
        }

        return L.circleMarker(latlng, {
          radius: 5,
          color: '#333',
          weight: 2,
          fillColor: '#fff',
          fillOpacity: 1,
          interactive: false
        });
      },
      onEachFeature: function(feature, layer) {
        // bewust leeg: geen popups voor markers
      }
    }).addTo(map);

    var allesBounds = L.featureGroup([parcoursLayer, markerLayer]);
    if (allesBounds.getBounds().isValid()) {
      map.fitBounds(allesBounds.getBounds(), { padding: [20, 20] });
    } else {
      map.setView([52.1, 5.1], 13);
    }

    var legend = L.control({ position: 'bottomright' });
    legend.onAdd = function () {
      var div = L.DomUtil.create('div', 'legend');
      div.innerHTML =
        '<div class="item"><span class="line" style="border-top-color:#0057B8"></span>Kleine ronde</div>' +
        '<div class="item"><span class="line" style="border-top-color:#D62828"></span>Grote ronde</div>' +
        '<div class="item"><span class="line" style="border-top-color:#E0B400"></span>Gedeeld deel</div>';
      return div;
    };
    legend.addTo(map);

    var locatieMarker = null;
    var locatieCirkel = null;

    function toonLocatie(e) {
      var latlng = e.latlng;
      var radius = e.accuracy || 0;

      if (locatieMarker) map.removeLayer(locatieMarker);
      if (locatieCirkel) map.removeLayer(locatieCirkel);

      var locatieIcon = L.divIcon({
        className: '',
        html: '<div class="mijn-locatie-icoon"></div>',
        iconSize: [18, 18],
        iconAnchor: [9, 9]
      });

      locatieMarker = L.marker(latlng, { icon: locatieIcon }).addTo(map);

      locatieCirkel = L.circle(latlng, {
        radius: radius,
        weight: 1,
        opacity: 0.6,
        fillOpacity: 0.15
      }).addTo(map);
    }

    function locatieFout(e) {
      alert('Locatie kon niet worden bepaald: ' + e.message);
    }

    map.on('locationfound', toonLocatie);
    map.on('locationerror', locatieFout);

    var LocateControl = L.Control.extend({
      options: { position: 'topleft' },
      onAdd: function() {
        var container = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-control-locate');
        var link = L.DomUtil.create('a', '', container);
        link.href = '#';
        link.title = 'Toon mijn locatie';
        link.innerHTML = '◎';

        L.DomEvent.disableClickPropagation(container);
        L.DomEvent.on(link, 'click', function(e) {
          L.DomEvent.stop(e);
          map.locate({
            setView: true,
            maxZoom: 19,
            enableHighAccuracy: true
          });
        });

        return container;
      }
    });

    map.addControl(new LocateControl());
  </script>
</body>
</html>
